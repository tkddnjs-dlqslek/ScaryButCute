<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap');
  html, body { width: 1280px; height: 800px; overflow: hidden; font-family: 'DM Sans', sans-serif; }

  .slide {
    width: 1280px; height: 800px;
    background: #110d0a;
    position: relative;
    overflow: hidden;
  }

  .screenshot {
    width: 1280px;
    height: auto;
    display: block;
  }

  .fade {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 420px;
    background: linear-gradient(to top, #110d0a 50%, #110d0a99 72%, transparent 100%);
    pointer-events: none;
  }
  .fade-left {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 420px;
    background: linear-gradient(to right, #110d0ae8 35%, transparent 100%);
    pointer-events: none;
  }

  /* Bottom-left: main title */
  .bottom-left {
    position: absolute;
    bottom: 44px; left: 56px;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-size: 54px;
    font-weight: 900;
    color: #f5f3f0;
    line-height: 1.05;
  }
  h1 span { color: #cc2200; }

  /* Bottom-right: platform section — BIG */
  .bottom-right {
    position: absolute;
    bottom: 36px; right: 52px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 14px;
  }

  .works-label {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #5a4a40;
  }

  .platform-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .platform-pill {
    display: flex;
    align-items: center;
    gap: 10px;
    border-radius: 14px;
    padding: 16px 30px;
    font-size: 26px;
    font-weight: 700;
    border: 2px solid;
    line-height: 1;
  }
  .platform-pill .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .platform-pill.yt {
    background: rgba(255,30,30,0.13);
    border-color: rgba(255,30,30,0.38);
    color: #ff6666;
  }
  .platform-pill.yt .dot { background: #ff3333; box-shadow: 0 0 8px rgba(255,50,50,0.7); }
  .platform-pill.nf {
    background: rgba(229,9,20,0.13);
    border-color: rgba(229,9,20,0.38);
    color: #ff5555;
  }
  .platform-pill.nf .dot { background: #e50914; box-shadow: 0 0 8px rgba(229,9,20,0.7); }
  .platform-pill.dp {
    background: rgba(30,100,240,0.13);
    border-color: rgba(30,100,240,0.38);
    color: #6699ff;
  }
  .platform-pill.dp .dot { background: #3366ff; box-shadow: 0 0 8px rgba(50,100,255,0.6); }
</style>
</head>
